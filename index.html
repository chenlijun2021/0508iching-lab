<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经美学实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior: none;
        }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes scanY {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan-y { animation: scanY 2.5s ease-in-out infinite; }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .zoom-in-95 { animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .poster-container { user-select: none; -webkit-touch-callout: default; }
    </style>
</head>
<body class="bg-[#F0F0F0] h-full overflow-hidden">
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ 请在此处填入你的 API Key
        // ==========================================
        const apiKey = "AIzaSyCYKMGDDcji7woHeGjsyxnUkSJ7IBGf1P0"; 

        const Icons = {
            Scan: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M9 12h6M12 9v6" />
                </svg>
            ),
            Close: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            ),
            Loading: () => (
                <svg className="animate-spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" strokeOpacity="0.2" />
                    <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeLinecap="round" />
                </svg>
            )
        };

        function App() {
            const [step, setStep] = useState('entry');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [theme, setTheme] = useState('lab');
            const [showPoster, setShowPoster] = useState(false);
            const [generatedIllustration, setGeneratedIllustration] = useState(null);
            const [isGeneratingImg, setIsGeneratingImg] = useState(false);
            const [decryptText, setDecryptText] = useState('00000000');
            const [errorMsg, setErrorMsg] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (!loading) return;
                const interval = setInterval(() => {
                    setDecryptText(Math.random().toString(36).substring(2, 10).toUpperCase());
                }, 80);
                return () => clearInterval(interval);
            }, [loading]);

            const extractJSON = (text) => {
                try {
                    const markdownMatch = text.match(/```json\s*([\s\S]*?)\s*```/) || text.match(/```\s*([\s\S]*?)\s*```/);
                    if (markdownMatch) return JSON.parse(markdownMatch[1].trim());
                    const start = text.indexOf('{');
                    const end = text.lastIndexOf('}');
                    if (start !== -1 && end !== -1) return JSON.parse(text.substring(start, end + 1).trim());
                    return JSON.parse(text.trim());
                } catch (e) { throw new Error("解析数据失败，请重试。"); }
            };

            // 图像压缩逻辑
            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; // 微信环境压缩至800宽足够
                            const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.7)); // 压缩为 0.7 质量的 JPEG
                        };
                    };
                });
            };

            const runProtocol = async (base64Image) => {
                setLoading(true);
                setErrorMsg('');
                
                // 修正模型名称和请求端点
                const model = "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                const prompt = `作为易经命理实验室AI，请分析这张掌纹。必须严格输出JSON：{"protocol_id": "ARCHIVE-8821","hexagram": "卦名","core_insight": "针对纹路给出3句观测记录","poster_quote": "一句有哲理的金句","metrics": {"天": 80, "地": 70, "人": 60},"aesthetic_guide": {"color_name": "建议色","color_hex": "#HEX","outfit_detail": "穿戴建议","vibe": "气质关键词"},"illustration_prompt": "a simple noun of a healing object in English"}`;
                
                try {
                    if (!apiKey) throw new Error("API Key 缺失");

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: "image/jpeg", data: base64Image.split(',')[1] } }
                                ]
                            }]
                        })
                    });
                    
                    const resData = await response.json();
                    if (resData.error) throw new Error(resData.error.message);

                    const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;
                    const json = extractJSON(text);
                    setData(json);
                    setStep('report');
                } catch (err) {
                    setErrorMsg("服务连接失败，请检查网络或 Key 额度");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setLoading(true);
                    const compressed = await compressImage(file);
                    runProtocol(compressed);
                }
            };

            const c = theme === 'lab' ? 
                { bg: 'bg-[#F0F0F0]', card: 'bg-white', text: 'text-[#121212]', accent: 'border-[#E0E0E0]' } : 
                { bg: 'bg-[#E8DDC3]', card: 'bg-[#F2EBD7]', text: 'text-[#483A2C]', accent: 'border-[#D0C4A8]' };

            return (
                <div className={`fixed inset-0 ${c.bg} flex items-center justify-center p-0 sm:p-4 transition-colors duration-700`}>
                    <div className={`w-full h-full sm:max-w-[400px] sm:h-[844px] sm:rounded-[2.5rem] ${c.card} ${c.text} shadow-2xl overflow-hidden relative flex flex-col border-none sm:border sm:border-black/5`}>
                        
                        {errorMsg && (
                            <div className="absolute top-20 left-4 right-4 bg-black text-white text-[10px] p-4 rounded-xl z-[100] animate-fade-in flex justify-between">
                                <span>⚠️ {errorMsg}</span>
                                <button onClick={() => setErrorMsg('')}>[关闭]</button>
                            </div>
                        )}

                        <header className={`pt-12 p-6 pb-4 border-b ${c.accent} flex justify-between items-center bg-inherit z-20`}>
                            <div className="space-y-0.5">
                                <h2 className="text-sm font-black tracking-tighter uppercase">Yi Jing Lab</h2>
                                <p className="text-[9px] opacity-30 font-mono tracking-widest">Protocol v5.0_FINAL</p>
                            </div>
                            <div className="flex bg-black/5 p-1 rounded-full scale-90">
                                <button onClick={() => setTheme('lab')} className={`px-4 py-1 rounded-full text-[10px] font-bold ${theme === 'lab' ? 'bg-white shadow-sm' : 'opacity-30'}`}>工业</button>
                                <button onClick={() => setTheme('paper')} className={`px-4 py-1 rounded-full text-[10px] font-bold ${theme === 'paper' ? 'bg-white shadow-sm' : 'opacity-30'}`}>纸本</button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto scrollbar-hide">
                            {step === 'entry' ? (
                                <div className="p-8 h-full flex flex-col animate-fade-in">
                                    <div className="mt-6 space-y-4">
                                        <h1 className="text-[42px] font-black leading-[0.9] tracking-tighter">拓扑<br/>解析</h1>
                                        <div className="h-0.5 w-8 bg-current opacity-20"></div>
                                        <p className="text-xs leading-relaxed opacity-60">请拍摄一张清晰的掌纹照片。<br/>AI 将根据纹理走向解析您的当下能量场。</p>
                                    </div>
                                    <div className="flex-1 flex items-center justify-center">
                                        <div onClick={() => !loading && fileInputRef.current.click()} className={`w-full aspect-square border-2 border-dashed ${c.accent} rounded-[2rem] flex flex-col items-center justify-center relative overflow-hidden transition-all ${loading ? 'bg-black/5' : 'active:bg-black/5 active:scale-95'}`}>
                                            {loading ? (
                                                <div className="flex flex-col items-center space-y-5">
                                                    <Icons.Loading />
                                                    <div className="text-center">
                                                        <div className="text-[11px] font-black tracking-widest animate-pulse">解析样本中...</div>
                                                        <div className="text-[9px] font-mono opacity-40 uppercase">{decryptText}</div>
                                                    </div>
                                                    <div className="absolute top-0 left-0 w-full h-1 bg-current opacity-20 animate-scan-y"></div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center animate-fade-in">
                                                    <div className="p-4 bg-current/5 rounded-full mb-4"><Icons.Scan /></div>
                                                    <span className="text-xs font-bold opacity-40 tracking-widest">点击开始解析</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleUpload} accept="image/*" />
                                </div>
                            ) : (
                                <div className="p-8 space-y-10 animate-fade-in pb-32">
                                    <div className="space-y-2">
                                        <div className="text-[10px] font-bold opacity-20 font-mono tracking-widest uppercase">Analysis Complete</div>
                                        <h1 className="text-5xl font-black tracking-tighter">{data.hexagram}卦</h1>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="text-[11px] font-black opacity-30 tracking-[0.2em] border-b pb-2 border-current/10 uppercase">观测报告</div>
                                        <p className="text-[13px] leading-relaxed text-justify opacity-90">{data.core_insight}</p>
                                    </div>
                                    <div className="p-6 border border-current/10 rounded-[1.5rem] bg-black/[0.02] space-y-6">
                                        <div className="text-[11px] font-black opacity-30 tracking-[0.2em] uppercase text-center">美学介入建议</div>
                                        <div className="flex items-center justify-center space-x-6">
                                            <div className="w-14 h-14 rounded-full shadow-inner border border-black/5" style={{ backgroundColor: data.aesthetic_guide.color_hex }}></div>
                                            <div className="space-y-0.5">
                                                <div className="text-xs font-bold">{data.aesthetic_guide.color_name}</div>
                                                <div className="text-[9px] opacity-30 font-mono uppercase">{data.aesthetic_guide.color_hex}</div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-2">
                                            <div className="text-[11px]"><span className="font-bold opacity-30 block text-[9px] mb-1 uppercase tracking-tighter">Outfit</span>{data.aesthetic_guide.outfit_detail}</div>
                                            <div className="text-[11px]"><span className="font-bold opacity-30 block text-[9px] mb-1 uppercase tracking-tighter">Vibe</span>{data.aesthetic_guide.vibe}</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        {step === 'report' && (
                            <div className="absolute bottom-0 left-0 right-0 p-6 pb-10 bg-inherit/80 backdrop-blur-md border-t border-current/5 flex space-x-3 z-30">
                                <button onClick={() => setStep('entry')} className="h-14 px-6 border border-current/10 rounded-2xl flex items-center justify-center font-bold text-xs opacity-40">重启</button>
                                <button onClick={() => setShowPoster(true)} className="flex-1 h-14 bg-[#111111] text-white rounded-2xl text-[11px] font-bold tracking-[0.2em] active:scale-95 shadow-xl">生成分享手账</button>
                            </div>
                        )}

                        {showPoster && (
                            <div className="absolute inset-0 z-[100] bg-black/95 backdrop-blur-2xl p-6 flex flex-col items-center justify-center animate-fade-in">
                                <div className="w-full max-w-[340px] aspect-[4/6] bg-white rounded-[2.5rem] p-8 flex flex-col relative overflow-hidden shadow-2xl text-[#111111] poster-container">
                                    <header className="flex justify-between items-start mb-4">
                                        <div className="text-3xl font-black tracking-tighter">{data.hexagram}卦</div>
                                        <div className="text-[8px] font-mono opacity-20 text-right uppercase">Private<br/>Archive</div>
                                    </header>
                                    <div className="h-px w-full bg-black/5 mb-8"></div>
                                    <div className="flex-1 flex flex-col justify-center items-center text-center">
                                        <div className="text-[20px] font-bold leading-tight px-4">“ {data.poster_quote} ”</div>
                                        <div className="text-[10px] opacity-30 mt-6 tracking-widest font-mono">LAB RECORD // {data.protocol_id}</div>
                                    </div>
                                    <footer className="mt-auto pt-8 flex justify-between items-end border-t border-black/5">
                                        <div className="flex items-center space-x-2">
                                            <div className="w-3 h-3 rounded-full" style={{ backgroundColor: data.aesthetic_guide.color_hex }}></div>
                                            <span className="text-[9px] font-bold opacity-40">{data.aesthetic_guide.color_name}</span>
                                        </div>
                                        <div className="text-[7px] font-mono opacity-20 uppercase tracking-[0.3em]">Verified AI Analysis</div>
                                    </footer>
                                </div>
                                <div className="mt-10 flex flex-col items-center space-y-6">
                                    <p className="text-white/40 text-[10px] font-bold tracking-[0.3em] uppercase">长按图片保存到相册</p>
                                    <button onClick={() => setShowPoster(false)} className="w-14 h-14 rounded-full bg-white/10 text-white flex items-center justify-center hover:bg-white/20"><Icons.Close /></button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
