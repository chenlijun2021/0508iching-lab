<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字蒲公英 - 灵动控制版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background-color: #030508; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        .ui-panel {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 24px;
            border-radius: 28px; color: #f8fafc; width: 300px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top left;
        }
        .ui-panel.collapsed {
            width: 60px; height: 60px; padding: 15px; overflow: hidden;
            background: rgba(0, 0, 0, 0.6);
        }
        .ui-content { transition: opacity 0.3s; opacity: 1; }
        .collapsed .ui-content { opacity: 0; pointer-events: none; }

        .toggle-btn {
            position: absolute; right: 18px; top: 18px; cursor: pointer;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.05); transition: 0.3s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.15); }

        label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.4); display: block; margin-bottom: 10px; }
        .control-group { margin-bottom: 22px; }
        
        input[type="color"] {
            appearance: none; border: none; width: 28px; height: 28px; cursor: pointer; 
            background: none; border-radius: 50%; overflow: hidden;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        
        input[type=range] { width: 100%; height: 2px; background: rgba(255,255,255,0.1); appearance: none; outline: none; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="mainPanel" class="ui-panel">
        <div class="toggle-btn" onclick="toggleUI()">
            <svg id="toggleIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
        </div>

        <div class="ui-content">
            <div class="text-[10px] font-light mb-8 tracking-[0.4em] opacity-60 flex items-center gap-3">
                <span>DANDELION V4</span>
                <span class="w-1.5 h-1.5 bg-white/80 rounded-full animate-pulse"></span>
            </div>
            
            <div class="control-group">
                <label>天空背景 (Space)</label>
                <input type="color" id="skyColor" value="#030508">
            </div>

            <div class="control-group">
                <label>花语色彩 (Seed)</label>
                <input type="color" id="dandColor" value="#ffffff">
            </div>

            <div class="control-group">
                <label>风力强度 (Wind Force)</label>
                <input type="range" id="windRange" min="5" max="40" value="25">
            </div>

            <div class="control-group">
                <label>归位速率 (Return Speed)</label>
                <input type="range" id="returnRange" min="1" max="10" value="3">
            </div>

            <div class="mt-8 pt-6 border-t border-white/5 text-[9px] text-white/20 leading-loose uppercase tracking-[0.2em] text-center italic">
                Tap to Scatter<br>Slowly they Drift Home
            </div>
        </div>
    </div>

    <script>
        let seeds = [];
        const numSeeds = 380; 
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ*+·~°.";
        let headPos, stemBase;
        let skyPicker, dandPicker, windSlider, returnSlider;
        let isBlown = false;
        let blowStartTime = 0;

        function toggleUI() {
            document.getElementById('mainPanel').classList.toggle('collapsed');
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 1);
            
            skyPicker = document.getElementById('skyColor');
            dandPicker = document.getElementById('dandColor');
            windSlider = document.getElementById('windRange');
            returnSlider = document.getElementById('returnRange');

            headPos = createVector(width / 2, height / 2 - 50);
            stemBase = createVector(width * 0.48, height + 20);

            // 使用斐波那契球面算法初始化目标点
            for (let i = 0; i < numSeeds; i++) {
                let phi = acos(1 - 2 * (i + 0.5) / numSeeds);
                let theta = PI * (1 + sqrt(5)) * (i + 0.5);
                seeds.push(new Seed(phi, theta, i));
            }
        }

        class Seed {
            constructor(phi, theta, index) {
                this.phi = phi;
                this.theta = theta;
                this.index = index;
                this.dir = createVector(sin(phi) * cos(theta), sin(phi) * sin(theta), cos(phi));
                
                this.noiseSeed = random(5000);
                this.char = chars[floor(random(chars.length))];
                this.baseSize = random(10, 22);
                
                this.pos = createVector(0, 0, 0); 
                this.vel = createVector(0, 0, 0);
                this.acc = createVector(0, 0, 0);
                this.state = 'STUCK'; 
                this.damping = random(0.93, 0.97);
            }

            update(hPos) {
                let breathe = map(sin(frameCount * 0.02 + this.noiseSeed), -1, 1, 140, 170);
                let targetPos = createVector(
                    hPos.x + this.dir.x * breathe,
                    hPos.y + this.dir.y * breathe
                );

                if (this.state === 'STUCK') {
                    this.pos.lerp(targetPos, 0.2);
                    
                    if (isBlown && millis() - blowStartTime > this.index * 2) {
                        this.state = 'FLYING';
                        let windForce = windSlider.value;
                        this.vel = createVector(random(windForce * 0.5, windForce), random(-windForce*0.3, windForce*0.1));
                    }
                } 
                else if (this.state === 'FLYING') {
                    // 飞行物理：受噪声风场和阻力影响
                    let noiseForce = createVector(noise(this.pos.x * 0.01, frameCount * 0.01) - 0.5, noise(this.pos.y * 0.01) - 0.5);
                    this.acc.add(createVector(0.4, -0.05)); // 基础微风
                    this.acc.add(noiseForce.mult(1.5));
                    
                    this.vel.add(this.acc);
                    this.pos.add(this.vel);
                    this.vel.mult(this.damping);
                    this.acc.mult(0);

                    // 延长飞行时间，根据速率参数调整进入回归的时机
                    let returnRate = returnSlider.value;
                    let flyDuration = map(returnRate, 1, 10, 6000, 2000); 
                    if (millis() - blowStartTime > flyDuration + this.index * 8) {
                        this.state = 'RETURNING';
                    }
                } 
                else if (this.state === 'RETURNING') {
                    let steer = p5.Vector.sub(targetPos, this.pos);
                    let dist = steer.mag();
                    steer.normalize();
                    
                    // 回归速率调节：1-10 映射到物理力量
                    // 越小则动作越慢、越柔和
                    let rate = parseFloat(returnSlider.value);
                    let maxSpeed = map(rate, 1, 10, 0.5, 8); 
                    let forceScale = map(rate, 1, 10, 0.01, 0.4);

                    // 到达目的地的减速带
                    if (dist < 100) {
                        let speed = map(dist, 0, 100, 0.1, maxSpeed);
                        steer.mult(speed);
                    } else {
                        steer.mult(maxSpeed);
                    }
                    
                    let pull = p5.Vector.sub(steer, this.vel);
                    pull.limit(forceScale);
                    
                    this.acc.add(pull);
                    this.vel.add(this.acc);
                    this.pos.add(this.vel);
                    this.acc.mult(0);

                    if (dist < 2) {
                        this.state = 'STUCK';
                    }
                }
            }

            render() {
                let zScale = map(this.dir.z, -1, 1, 0.6, 1.5);
                let zAlpha = map(this.dir.z, -1, 1, 0.3, 1);
                
                push();
                translate(this.pos.x, this.pos.y);
                
                if (this.state === 'STUCK') {
                    let angle = atan2(this.pos.y - headPos.y, this.pos.x - headPos.x);
                    rotate(angle + PI/2);
                } else {
                    rotate(frameCount * 0.03 + this.noiseSeed);
                }

                let c = color(dandPicker.value);
                fill(hue(c), saturation(c), brightness(c), zAlpha);
                noStroke();
                textAlign(CENTER, CENTER);
                textSize(this.baseSize * zScale);
                text(this.char, 0, 0);
                pop();
            }
        }

        function draw() {
            background(skyPicker.value);

            let time = frameCount * 0.01;
            let nx = (noise(time) - 0.5) * 180;
            let ny = (noise(time + 99) - 0.5) * 50;
            
            headPos.x = lerp(headPos.x, width / 2 + nx, 0.05);
            headPos.y = lerp(headPos.y, height / 2 - 40 + ny, 0.05);

            drawSolidStem();

            let sortedSeeds = [...seeds].sort((a, b) => a.dir.z - b.dir.z);
            for (let s of sortedSeeds) {
                s.update(headPos);
                s.render();
            }

            // 逻辑检查：如果全部归位，重置吹飞状态
            if (isBlown && seeds.every(s => s.state === 'STUCK')) {
                isBlown = false;
            }
        }

        function drawSolidStem() {
            let c = color(dandPicker.value);
            noFill();
            stroke(hue(c), saturation(c), brightness(c) * 0.8, 1.0); 
            strokeWeight(1.2); 
            strokeCap(ROUND);

            let ctrlX = lerp(stemBase.x, headPos.x, 0.1) - (headPos.x - width/2) * 0.3; 
            let ctrlY = lerp(stemBase.y, headPos.y, 0.5);

            beginShape();
            vertex(stemBase.x, stemBase.y);
            quadraticVertex(ctrlX, ctrlY, headPos.x, headPos.y);
            endShape();
            
            fill(hue(c), saturation(c), brightness(c) * 0.6, 1.0);
            noStroke();
            ellipse(headPos.x, headPos.y, 10, 6);
        }

        function mousePressed() {
            // 点击面板时不触发吹散
            if (mouseX < 340 && mouseY < 400 && !document.getElementById('mainPanel').classList.contains('collapsed')) return;
            
            isBlown = true;
            blowStartTime = millis();
            for(let s of seeds) {
                if(s.state !== 'STUCK') {
                    s.state = 'FLYING';
                    let windForce = windSlider.value;
                    s.vel.add(createVector(random(windForce * 0.2), random(-windForce*0.2, 0)));
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            stemBase.set(width * 0.48, height + 20);
        }
    </script>
</body>
</html>
