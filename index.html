<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior: none;
            background-color: #F5F5F5;
        }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes scanY {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan-y { animation: scanY 2.5s ease-in-out infinite; }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="h-full overflow-hidden">
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ 必须在这里填入你的 API Key
        // ==========================================
        const apiKey = "AIzaSyCYKMGDDcji7woHeGjsyxnUkSJ7IBGf1P0"; 

        const Icons = {
            Scan: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M9 12h6M12 9v6" />
                </svg>
            ),
            Close: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            ),
            Loading: () => (
                <svg className="animate-spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" strokeOpacity="0.2" />
                    <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeLinecap="round" />
                </svg>
            )
        };

        function App() {
            const [step, setStep] = useState('entry');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [theme, setTheme] = useState('lab');
            const [showPoster, setShowPoster] = useState(false);
            const [decryptText, setDecryptText] = useState('READY');
            const [errorMsg, setErrorMsg] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (!loading) return;
                const interval = setInterval(() => {
                    setDecryptText(Math.random().toString(36).substring(2, 10).toUpperCase());
                }, 100);
                return () => clearInterval(interval);
            }, [loading]);

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 750; 
                            const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
                        };
                    };
                });
            };

            const callAPI = async (model, base64Data) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "你是一个易经与美学专家。分析这张手掌照片。必须严格返回JSON格式，不要有任何多余说明文字：{\"hexagram\":\"卦名\",\"core_insight\":\"一段100字内的核心分析\",\"poster_quote\":\"一句哲思金句\",\"aesthetic_guide\":{\"color_hex\":\"#HEX\",\"outfit_detail\":\"穿搭建议\",\"vibe\":\"气质关键词\"}}" },
                                { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                            ]
                        }]
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || response.status);
                }
                
                const res = await response.json();
                const text = res.candidates?.[0]?.content?.parts?.[0]?.text;
                const jsonStr = text.match(/\{[\s\S]*\}/)[0];
                return JSON.parse(jsonStr);
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!apiKey) {
                    setErrorMsg("请先在代码中配置 API Key");
                    return;
                }

                setLoading(true);
                setErrorMsg('');
                
                try {
                    const base64 = await compressImage(file);
                    
                    // 尝试多个模型以规避 404
                    const models = ["gemini-1.5-flash", "gemini-1.5-pro"];
                    let result = null;
                    let lastError = "";

                    for (let m of models) {
                        try {
                            result = await callAPI(m, base64);
                            if (result) break;
                        } catch (err) {
                            lastError = err.message;
                            console.warn(`${m} 尝试失败:`, err);
                        }
                    }

                    if (result) {
                        setData(result);
                        setStep('report');
                    } else {
                        setErrorMsg(`服务连接失败: ${lastError}`);
                    }
                } catch (err) {
                    setErrorMsg("系统解析异常，请稍后重试");
                } finally {
                    setLoading(false);
                }
            };

            const c = theme === 'lab' ? 
                { bg: 'bg-[#F5F5F5]', card: 'bg-white', text: 'text-[#121212]', accent: 'border-[#EEEEEE]' } : 
                { bg: 'bg-[#EAE1D2]', card: 'bg-[#F4F0E6]', text: 'text-[#3E2F20]', accent: 'border-[#D9CDBA]' };

            return (
                <div className={`fixed inset-0 ${c.bg} flex items-center justify-center transition-colors duration-500`}>
                    <div className={`w-full h-full sm:max-w-[400px] sm:max-h-[812px] sm:rounded-[2.5rem] ${c.card} ${c.text} shadow-2xl relative flex flex-col overflow-hidden`}>
                        
                        {errorMsg && (
                            <div className="absolute top-20 left-4 right-4 bg-black text-white text-[11px] p-4 rounded-xl z-[100] animate-fade-in shadow-xl flex justify-between">
                                <span>⚠️ {errorMsg}</span>
                                <button onClick={() => setErrorMsg('')} className="font-bold underline">关闭</button>
                            </div>
                        )}

                        <header className={`pt-12 p-8 flex justify-between items-center bg-inherit z-20`}>
                            <div className="space-y-0.5">
                                <h2 className="text-[10px] font-black tracking-[0.2em] uppercase opacity-40">AESTHETIC LAB</h2>
                                <h1 className="text-xl font-black tracking-tight">易经美学实验室</h1>
                            </div>
                            <div className="flex bg-black/5 p-1 rounded-full scale-90">
                                <button onClick={() => setTheme('lab')} className={`px-4 py-1 rounded-full text-[10px] font-bold ${theme === 'lab' ? 'bg-white shadow-sm' : 'opacity-30'}`}>工业</button>
                                <button onClick={() => setTheme('paper')} className={`px-4 py-1 rounded-full text-[10px] font-bold ${theme === 'paper' ? 'bg-white shadow-sm' : 'opacity-30'}`}>纸本</button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto scrollbar-hide p-8">
                            {step === 'entry' ? (
                                <div className="h-full flex flex-col animate-fade-in">
                                    <div className="mt-4 space-y-3">
                                        <div className="h-1 w-6 bg-current opacity-20"></div>
                                        <p className="text-xs leading-relaxed opacity-50">上传清晰的掌纹图像，由 AI 系统解析您的易经卦象与美学能量。</p>
                                    </div>
                                    <div className="flex-1 flex items-center justify-center">
                                        <div onClick={() => !loading && fileInputRef.current.click()} className={`w-full aspect-square border-2 border-dashed ${c.accent} rounded-[2.5rem] flex flex-col items-center justify-center relative overflow-hidden transition-all ${loading ? 'bg-black/5' : 'active:scale-95 cursor-pointer hover:bg-black/5'}`}>
                                            {loading ? (
                                                <div className="flex flex-col items-center space-y-4">
                                                    <Icons.Loading />
                                                    <div className="text-center">
                                                        <div className="text-[10px] font-bold tracking-widest animate-pulse">正在处理数据流...</div>
                                                        <div className="text-[9px] font-mono opacity-30 mt-1 uppercase tracking-tight">{decryptText}</div>
                                                    </div>
                                                    <div className="absolute top-0 left-0 w-full h-1 bg-current opacity-20 animate-scan-y"></div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center opacity-20">
                                                    <Icons.Scan />
                                                    <span className="text-[10px] font-bold mt-4 tracking-widest">点击开始解析</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleUpload} accept="image/*" />
                                </div>
                            ) : (
                                <div className="space-y-8 animate-fade-in pb-20">
                                    <div className="space-y-1">
                                        <div className="text-[9px] font-bold opacity-30 font-mono tracking-widest uppercase">Result Archive</div>
                                        <h1 className="text-5xl font-black tracking-tighter">{data.hexagram}卦</h1>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="text-[10px] font-bold opacity-30 tracking-widest border-b pb-2 border-current/10 uppercase">核心启示</div>
                                        <p className="text-[14px] leading-relaxed text-justify opacity-80">{data.core_insight}</p>
                                    </div>
                                    <div className={`p-6 border ${c.accent} rounded-[2rem] bg-current/[0.02] space-y-6`}>
                                        <div className="flex items-center justify-between">
                                            <div className="w-12 h-12 rounded-full border-4 border-white shadow-sm" style={{ backgroundColor: data.aesthetic_guide.color_hex }}></div>
                                            <div className="text-right">
                                                <div className="text-[9px] font-bold opacity-30 uppercase mb-0.5">Theme Color</div>
                                                <div className="text-xs font-mono font-bold">{data.aesthetic_guide.color_hex}</div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 border-t border-current/5 pt-4">
                                            <div>
                                                <span className="block text-[9px] font-bold opacity-30 uppercase mb-1">穿搭建议</span>
                                                <p className="text-[11px] font-bold leading-tight">{data.aesthetic_guide.outfit_detail}</p>
                                            </div>
                                            <div>
                                                <span className="block text-[9px] font-bold opacity-30 uppercase mb-1">气质关键词</span>
                                                <p className="text-[11px] font-bold leading-tight">{data.aesthetic_guide.vibe}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        {step === 'report' && (
                            <div className="p-8 pb-10 bg-inherit border-t border-current/5 flex space-x-2 safe-bottom z-30">
                                <button onClick={() => setStep('entry')} className="h-14 px-5 border border-current/10 rounded-2xl flex items-center justify-center opacity-30 active:scale-95">
                                    <Icons.Scan />
                                </button>
                                <button onClick={() => setShowPoster(true)} className="flex-1 h-14 bg-black text-white rounded-2xl text-[11px] font-black tracking-widest uppercase active:scale-95 shadow-xl">生成分析海报</button>
                            </div>
                        )}

                        {showPoster && (
                            <div className="absolute inset-0 z-[100] bg-black/95 backdrop-blur-xl p-6 flex flex-col items-center justify-center animate-fade-in">
                                <div className="w-full max-w-[300px] aspect-[4/6] bg-white rounded-[2rem] p-10 flex flex-col shadow-2xl text-[#111111] relative overflow-hidden">
                                    <h2 className="text-3xl font-black mb-6">{data.hexagram}卦</h2>
                                    <div className="flex-1 flex items-center justify-center text-center">
                                        <p className="text-[20px] font-bold leading-tight italic">“{data.poster_quote}”</p>
                                    </div>
                                    <footer className="mt-auto pt-6 border-t border-black/5 flex justify-between items-end">
                                        <div className="text-[8px] font-black opacity-20 uppercase tracking-[0.2em]">Yi Jing AI Lab</div>
                                        <div className="w-4 h-4 rounded-full" style={{ backgroundColor: data.aesthetic_guide.color_hex }}></div>
                                    </footer>
                                </div>
                                <p className="text-white/40 text-[9px] mt-10 tracking-[0.4em] font-bold uppercase">长按截图保存结果</p>
                                <button onClick={() => setShowPoster(false)} className="mt-8 w-12 h-12 rounded-full bg-white/10 text-white flex items-center justify-center active:scale-90 border border-white/10"><Icons.Close /></button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
